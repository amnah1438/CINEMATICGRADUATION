<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم الإرسال ✅</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <meta http-equiv="refresh" content="4;url=/">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Tajawal', sans-serif; min-height: 100vh; background: radial-gradient(ellipse at 40% 20%, #1a0533 0%, #05010f 70%); display: flex; align-items: center; justify-content: center; color: #fff; }
    .box { text-align: center; padding: 48px 32px; }
    .icon { font-size: 80px; margin-bottom: 20px; animation: bounce .6s ease-in-out; }
    @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    h1 { font-size: 32px; font-weight: 900; margin-bottom: 10px; }
    p  { font-size: 18px; color: rgba(201,162,39,.7); margin-bottom: 24px; }
    .hint { font-size: 14px; color: rgba(255,255,255,.3); }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🎉</div>
    <h1>تم إرسال رسالتكِ!</h1>
    <p>ستظهر على شاشة العرض قريباً 🌸</p>
    <div class="hint">سيتم تحويلك لشاشة العرض تلقائياً…</div>
  </div>
</body>
</html>
