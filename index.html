<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>حفل تخرج الطالبات ١٤٤٦هـ</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    /* ══════════════════════════════════════════
       TOKENS & RESET
    ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:      #c9a227;
      --gold-lt:   #f0d060;
      --purple:    #7c3aed;
      --purple-lt: #a855f7;
      --navy:      #05010f;
    }

    /* fluid base: 14px on mobile → 20px on 4K */
    html { font-size: clamp(13px, calc(8px + .7vw), 20px); }

    html, body {
      width: 100%;
      min-height: 100dvh;
      overflow-x: hidden;
      background: var(--navy);
      font-family: 'Tajawal', sans-serif;
      color: #fff;
    }

    /* ══════════════════════════════════════════
       BACKGROUNDS
    ══════════════════════════════════════════ */
    .bg-base {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 130% 55% at 50% 0%, #1a0533 0%, #05010f 60%),
        radial-gradient(ellipse 80%  50% at 80% 100%, #0d0830 0%, transparent 70%);
    }

    .aurora { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .a1,.a2,.a3,.a4 { position: absolute; border-radius: 50%; filter: blur(max(40px,5vw)); }
    .a1 { width:80vw;  height:35vh; background:radial-gradient(ellipse,rgba(124,58,237,.22)  0%,transparent 70%); top:-10vh; left:-15vw;  animation:au1 14s ease-in-out infinite alternate; }
    .a2 { width:60vw;  height:30vh; background:radial-gradient(ellipse,rgba(168,85,247,.14)  0%,transparent 70%); top:30vh;  right:-10vw; animation:au2 18s ease-in-out infinite alternate; }
    .a3 { width:55vw;  height:28vh; background:radial-gradient(ellipse,rgba(201,162,39,.12)  0%,transparent 70%); bottom:30vh;left:-8vw;  animation:au1 22s ease-in-out infinite alternate-reverse; }
    .a4 { width:45vw;  height:22vh; background:radial-gradient(ellipse,rgba(244,114,182,.10) 0%,transparent 70%); bottom:5vh; right:-5vw; animation:au2 16s ease-in-out infinite alternate; }
    @keyframes au1 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(3vw,3vh) scale(1.3)} }
    @keyframes au2 { 0%{transform:translate(0,0) scale(1.1)} 100%{transform:translate(-3vw,4vh) scale(.9)} }

    #stars-canvas,#confetti-canvas { position:fixed; inset:0; pointer-events:none; width:100%; height:100%; }
    #stars-canvas    { z-index:2; }
    #confetti-canvas { z-index:100; }

    .particle { position:fixed; border-radius:50%; pointer-events:none; z-index:3; animation:pfloat linear infinite; opacity:0; }
    @keyframes pfloat {
      0%   { transform:translateY(105vh) scale(0); opacity:0; }
      5%   { opacity:1; }
      95%  { opacity:.5; }
      100% { transform:translateY(-5vh) scale(1.5); opacity:0; }
    }

    .rays-wrap { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100vw; height:55vh; overflow:hidden; z-index:3; pointer-events:none; }
    .ray { position:absolute; bottom:0; left:50%; width:1px; height:55vh; background:linear-gradient(to top,transparent,rgba(201,162,39,.08),transparent); transform-origin:bottom center; animation:rayPulse 8s ease-in-out infinite; }
    .ray:nth-child(1){transform:rotate(-50deg);animation-delay:0s}    .ray:nth-child(2){transform:rotate(-35deg);animation-delay:.7s}
    .ray:nth-child(3){transform:rotate(-20deg);animation-delay:1.4s}  .ray:nth-child(4){transform:rotate(-5deg);animation-delay:2.1s}
    .ray:nth-child(5){transform:rotate(10deg);animation-delay:2.8s}   .ray:nth-child(6){transform:rotate(25deg);animation-delay:3.5s}
    .ray:nth-child(7){transform:rotate(40deg);animation-delay:4.2s}   .ray:nth-child(8){transform:rotate(55deg);animation-delay:4.9s}
    @keyframes rayPulse { 0%,100%{opacity:0} 50%{opacity:1} }

    /* ══════════════════════════════════════════
       SCREEN
    ══════════════════════════════════════════ */
    .screen {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      padding: clamp(.8rem,2.5vh,2.5rem) clamp(.8rem,4vw,3.5rem) clamp(.4rem,1.2vh,1.2rem);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      gap: .8em;
    }

    .logo-wrap { display:flex; flex-direction:column; align-items:center; gap:.4em; flex-shrink:0; }
    .logo-ring {
      width:  clamp(52px,7vw,100px);
      height: clamp(52px,7vw,100px);
      border-radius: 50%;
      border: 1.5px solid rgba(201,162,39,.5);
      background: radial-gradient(circle,rgba(201,162,39,.1) 0%,transparent 70%);
      box-shadow: 0 0 clamp(12px,2vw,28px) rgba(201,162,39,.22), inset 0 0 clamp(8px,1.5vw,16px) rgba(201,162,39,.08);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      animation: logoPulse 4s ease-in-out infinite;
    }
    .logo-ring img { width:86%; height:86%; object-fit:contain; }
    .logo-ring .logo-default { font-size:clamp(1.4rem,3vw,2.4rem); }
    @keyframes logoPulse { 0%,100%{box-shadow:0 0 20px rgba(201,162,39,.18)} 50%{box-shadow:0 0 38px rgba(201,162,39,.42)} }
    .logo-label { font-size:clamp(.55rem,.9vw,.75rem); color:rgba(201,162,39,.6); letter-spacing:1px; text-align:center; line-height:1.4; }

    .header-center { flex:1; text-align:center; padding:0 clamp(.4rem,1.5vw,1.2rem); min-width:0; }
    .event-pill {
      display:inline-block;
      background:linear-gradient(135deg,rgba(201,162,39,.15),rgba(124,58,237,.15));
      border:1px solid rgba(201,162,39,.4);
      border-radius:50px; padding:.3em 1.4em;
      font-size:clamp(.65rem,1.1vw,.85rem);
      color:rgba(240,208,96,.9); letter-spacing:2px; margin-bottom:.4em;
    }
    .header-title {
      font-size: clamp(1.1rem,3.2vw,2.4rem);
      font-weight:800; color:#fff; line-height:1.2;
      text-shadow:0 0 40px rgba(201,162,39,.4);
    }
    .header-sub {
      margin-top:.35em;
      font-size:clamp(.75rem,1.4vw,1.1rem);
      color:rgba(201,162,39,.7); letter-spacing:1px;
    }

    .h-divider { width:90%; display:flex; align-items:center; flex-shrink:0; margin-top:.3em; }
    .h-divider-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(201,162,39,.55),transparent); }
    .h-divider-star { color:var(--gold); font-size:.75rem; padding:0 .6em; }

    /* ── TICKER ── */
    .ticker {
      width:100%; overflow:hidden;
      background:linear-gradient(90deg,transparent,rgba(124,58,237,.14),rgba(201,162,39,.09),rgba(124,58,237,.14),transparent);
      border-top:1px solid rgba(201,162,39,.18); border-bottom:1px solid rgba(201,162,39,.18);
      padding:.65em 0; flex-shrink:0; margin-top:.6em;
    }
    .ticker-track { display:flex; gap:4em; white-space:nowrap; animation:tickerScroll 22s linear infinite; width:max-content; }
    .ticker-item { font-size:clamp(.75rem,1.4vw,1rem); color:rgba(255,255,255,.7); display:flex; align-items:center; gap:.6em; }
    .t-star { color:var(--gold); font-size:.7em; }
    @keyframes tickerScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

    /* ══════════════════════════════════════════
       3D CARD STAGE
    ══════════════════════════════════════════ */
    .main-area {
      flex:1; width:100%;
      display:flex; align-items:center; justify-content:center;
      padding:clamp(.5rem,2vh,2rem) clamp(.5rem,2vw,2rem);
      position:relative; overflow:hidden;
    }

    .card-stage {
      position:relative;
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
      perspective: clamp(700px,140vw,2200px);
      perspective-origin:50% 42%;
      transform-style:preserve-3d;
      min-height:clamp(400px,60vh,900px);
    }

    /* ══════════════════════════════════════════
       GRAD CARD
    ══════════════════════════════════════════ */
    .grad-card {
      position:absolute;
      width: min(88vw, 58vh, 700px);
      background:linear-gradient(158deg,
        rgba(255,255,255,.055) 0%,
        rgba(124,58,237,.09)  35%,
        rgba(201,162,39,.055) 70%,
        rgba(255,255,255,.035) 100%);
      backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
      border-radius:clamp(1.5rem,3.5vw,2.8rem);
      border:1px solid rgba(201,162,39,.32);
      padding:clamp(1.4rem,4vh,3.8rem) clamp(1.1rem,3vw,3rem) clamp(1.1rem,3vh,2.8rem);
      display:flex; flex-direction:column; align-items:center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.05) inset,
        0 clamp(20px,5vh,60px) clamp(40px,10vh,100px) rgba(0,0,0,.6),
        0 0 clamp(20px,5vw,55px) rgba(124,58,237,.1);

      /* 3D transitions */
      transition:
        transform .9s cubic-bezier(.4,0,.2,1),
        opacity   .9s cubic-bezier(.4,0,.2,1),
        filter    .9s ease;
      will-change:transform,opacity,filter;
      transform-style:preserve-3d;
    }

    /* ══ 3D CAROUSEL STATES ══ */
    .grad-card[data-pos="0"] {
      transform:translateX(0) translateZ(0) rotateY(0deg) scale(1);
      opacity:1; filter:blur(0px); z-index:20; pointer-events:auto;
    }
    .grad-card[data-pos="1"] {
      transform:translateX(46%) translateZ(-32vw) rotateY(-32deg) scale(0.80);
      opacity:.4; filter:blur(2.5px); z-index:10; pointer-events:none;
    }
    .grad-card[data-pos="-1"] {
      transform:translateX(-46%) translateZ(-32vw) rotateY(32deg) scale(0.80);
      opacity:.4; filter:blur(2.5px); z-index:10; pointer-events:none;
    }
    .grad-card[data-pos="2"],
    .grad-card[data-pos="-2"] {
      transform:translateX(0) translateZ(-64vw) rotateY(0deg) scale(0.55);
      opacity:.12; filter:blur(5px); z-index:5; pointer-events:none;
    }
    .grad-card[data-pos="far"] {
      transform:translateX(0) translateZ(-90vw) scale(.3);
      opacity:0; filter:blur(10px); z-index:1; pointer-events:none;
    }

    /* Card corner ornaments */
    .cc { position:absolute; width:clamp(28px,3.5vw,50px); height:clamp(28px,3.5vw,50px); border-color:rgba(201,162,39,.5); border-style:solid; }
    .cc.tl{top:1.1em;right:1.1em;border-width:2px 0 0 2px;border-radius:.6em 0 0 0}
    .cc.tr{top:1.1em;left:1.1em;border-width:2px 2px 0 0;border-radius:0 .6em 0 0}
    .cc.bl{bottom:1.1em;right:1.1em;border-width:0 0 2px 2px;border-radius:0 0 0 .6em}
    .cc.br{bottom:1.1em;left:1.1em;border-width:0 2px 2px 0;border-radius:0 0 .6em 0}

    /* ── AVATAR ── */
    .avatar-wrap { position:relative; margin-bottom:clamp(.9rem,2.8vh,2.2rem); }
    .avatar-glow { position:absolute; inset:-18%; border-radius:50%; filter:blur(clamp(10px,3vw,22px)); animation:glowPulse 3s ease-in-out infinite; }
    @keyframes glowPulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.18)} }

    .avatar-ring {
      width:  clamp(100px,14vw,195px);
      height: clamp(100px,14vw,195px);
      border-radius:50%;
      border:2.5px solid var(--gold);
      box-shadow:0 0 clamp(14px,4vw,34px) rgba(201,162,39,.5),0 0 clamp(28px,8vw,72px) rgba(201,162,39,.2);
      display:flex; align-items:center; justify-content:center;
      position:relative; z-index:2;
      background:rgba(5,1,15,.4);
      overflow:hidden;
    }
    .avatar-inner {
      width:85%; height:85%;
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    .avatar-inner svg { width:100%; height:100%; }

    .orbit {
      position:absolute; width:118%; height:118%;
      border-radius:50%;
      border:1px dashed rgba(201,162,39,.28);
      top:50%; left:50%; transform:translate(-50%,-50%);
      animation:orbit 12s linear infinite;
    }
    @keyframes orbit { from{transform:translate(-50%,-50%) rotate(0deg)} to{transform:translate(-50%,-50%) rotate(360deg)} }
    .orbit-dot { position:absolute;width:7px;height:7px;background:var(--gold);border-radius:50%;top:-4px;left:50%;margin-left:-3.5px;box-shadow:0 0 8px rgba(201,162,39,.9); }

    .grad-cap-badge {
      position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
      background:linear-gradient(135deg,#b8860b,#f0d060,#b8860b);
      border-radius:30px; padding:.32em 1.1em;
      font-size:clamp(.6rem,1.1vw,.85rem);
      color:#1a0533; font-weight:800; white-space:nowrap; z-index:3;
      box-shadow:0 4px 20px rgba(201,162,39,.45);
    }

    /* ── CARD TEXT ── */
    .student-name {
      font-size:clamp(1.4rem,4vw,3.2rem);
      font-weight:900; color:#fff; text-align:center; line-height:1.2;
      margin-bottom:.45em;
      text-shadow:0 0 50px rgba(124,58,237,.65),0 4px 24px rgba(0,0,0,.4);
    }
    .grad-pill {
      display:inline-flex; align-items:center; gap:.6em;
      background:linear-gradient(135deg,rgba(201,162,39,.14),rgba(124,58,237,.14));
      border:1px solid rgba(201,162,39,.4); border-radius:50px;
      padding:.45em 1.5em;
      font-size:clamp(.78rem,1.4vw,1.1rem);
      color:rgba(240,208,96,.95); margin-bottom:clamp(.9rem,2.5vh,2.2rem); letter-spacing:1px;
    }
    .divider { width:100%; display:flex; align-items:center; gap:.9em; margin-bottom:clamp(.7rem,2vh,1.8rem); }
    .div-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(201,162,39,.4),transparent); }
    .div-icon { color:var(--gold); font-size:1.1em; }

    .msg-box {
      background:rgba(255,255,255,.032);
      border:1px solid rgba(255,255,255,.09);
      border-radius:clamp(.8rem,2vw,1.5rem);
      padding:clamp(.9rem,2.8vh,2.4rem) clamp(.9rem,2.5vw,2.4rem);
      text-align:center; width:100%; position:relative;
      margin-bottom:clamp(.7rem,2vh,1.8rem);
    }
    .q-mark {
      position:absolute; top:-8px; right:.9em;
      font-family:Georgia,serif;
      font-size:clamp(3rem,7vw,6rem);
      color:rgba(201,162,39,.16); line-height:1; pointer-events:none;
    }
    .msg-text {
      font-size:clamp(.88rem,1.7vw,1.45rem);
      line-height:1.95; color:rgba(255,255,255,.88); font-weight:400;
    }

    .sig { display:flex; align-items:center; gap:.7em; margin-top:.7em; }
    .sig-line { width:2em; height:1px; background:rgba(201,162,39,.5); }
    .sig-name { font-size:clamp(.78rem,1.4vw,1.1rem); color:rgba(201,162,39,.85); font-weight:500; }

    .quote-row { width:100%; text-align:center; margin-top:.9em; padding-top:.9em; border-top:1px solid rgba(255,255,255,.06); }
    .quote-text { font-size:clamp(.72rem,1.25vw,.98rem); color:rgba(255,255,255,.38); font-style:italic; letter-spacing:.5px; }

    /* ══ PROGRESS ══ */
    .timer-bar-wrap { width:86%; height:2px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; margin:0 auto .4em; flex-shrink:0; }
    .timer-bar { height:100%; width:0%; background:linear-gradient(90deg,var(--purple-lt),var(--gold)); border-radius:2px; transition:width linear; }

    .progress-wrap { width:100%; display:flex; justify-content:center; gap:.55em; padding:.45em 0 .7em; flex-shrink:0; }
    .dot { width:.5rem; height:.5rem; border-radius:50%; background:rgba(255,255,255,.2); transition:all .55s cubic-bezier(.4,0,.2,1); }
    .dot.active { background:var(--gold); box-shadow:0 0 10px rgba(201,162,39,.75); width:1.9rem; border-radius:4px; }

    /* ══ BOTTOM BAR ══ */
    .bottom-bar {
      width:100%;
      padding:clamp(.7rem,1.5vh,1.2rem) clamp(.8rem,4vw,3.5rem) clamp(.9rem,3vh,2.2rem);
      display:flex; justify-content:space-between; align-items:center;
      flex-shrink:0; border-top:1px solid rgba(201,162,39,.12);
      gap:.8em; flex-wrap:wrap;
    }
    .counter-badge { display:inline-flex; align-items:center; gap:.5em; background:rgba(201,162,39,.09); border:1px solid rgba(201,162,39,.28); border-radius:50px; padding:.35em 1em; }
    .counter-num { font-size:clamp(.95rem,1.9vw,1.5rem); font-weight:800; color:var(--gold); }
    .counter-lbl { font-size:clamp(.58rem,1vw,.78rem); color:rgba(255,255,255,.48); }
    .credit { font-size:clamp(.58rem,.95vw,.82rem); color:rgba(201,162,39,.5); letter-spacing:1px; text-align:center; }
    .datetime { font-size:clamp(.58rem,.95vw,.82rem); color:rgba(255,255,255,.38); text-align:left; line-height:1.75; }

    /* ══ FAB ══ */
    .fab {
      position:fixed; bottom:clamp(1.2rem,3.5vh,3rem); left:50%; transform:translateX(-50%);
      background:linear-gradient(135deg,#7c3aed,#a855f7);
      border:none; border-radius:60px;
      padding:clamp(.75rem,1.5vh,1.25rem) clamp(1.8rem,4.5vw,3.2rem);
      font-family:'Tajawal',sans-serif;
      font-size:clamp(.95rem,2.2vw,1.55rem);
      font-weight:800; color:#fff; cursor:pointer; z-index:200;
      box-shadow:0 8px 40px rgba(124,58,237,.6),0 0 0 0 rgba(124,58,237,.4);
      animation:fabPulse 2.5s ease-in-out infinite;
      display:flex; align-items:center; gap:.55em; letter-spacing:1px; white-space:nowrap;
    }
    @keyframes fabPulse {
      0%,100%{box-shadow:0 8px 40px rgba(124,58,237,.6),0 0 0 0 rgba(124,58,237,.35);}
      50%{box-shadow:0 8px 52px rgba(124,58,237,.75),0 0 0 18px rgba(124,58,237,0);}
    }
    .fab:hover { opacity:.92; transform:translateX(-50%) scale(1.04); }

    /* ══ MODAL ══ */
    .modal-overlay {
      position:fixed; inset:0;
      background:rgba(0,0,0,.9);
      backdrop-filter:blur(18px);
      z-index:500; display:none; align-items:center; justify-content:center;
      padding:clamp(.8rem,2.5vw,2rem);
    }
    .modal-overlay.open { display:flex; }
    .modal-box {
      background:linear-gradient(158deg,#1a0a38,#0f0820);
      border:1px solid rgba(201,162,39,.32);
      border-radius:clamp(1.1rem,2.8vw,2.2rem);
      padding:clamp(1.8rem,4.5vw,3.8rem) clamp(1.4rem,3.5vw,3.5rem);
      width:min(92vw,680px);
      max-height:92dvh; overflow-y:auto;
      box-shadow:0 0 80px rgba(124,58,237,.35),0 40px 100px rgba(0,0,0,.75);
      position:relative;
    }
    .modal-close {
      position:absolute; top:1em; left:1.1em;
      background:rgba(255,255,255,.09); border:none;
      width:2.4em; height:2.4em; border-radius:50%;
      font-size:1rem; color:#fff; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .2s;
    }
    .modal-close:hover { background:rgba(255,255,255,.18); }
    .modal-title { font-size:clamp(1.3rem,3.5vw,2.1rem); font-weight:900; color:#fff; text-align:center; margin-bottom:.3em; }
    .modal-sub   { font-size:clamp(.82rem,1.7vw,1.05rem); color:rgba(201,162,39,.72); text-align:center; margin-bottom:clamp(1.3rem,3.5vh,2.8rem); }
    .form-field  { margin-bottom:clamp(.9rem,2.3vh,1.7rem); }
    .form-label  { display:block; font-size:clamp(.82rem,1.4vw,1.05rem); font-weight:600; color:rgba(255,255,255,.72); margin-bottom:.45em; }
    .form-input {
      width:100%; padding:clamp(.65rem,1.4vh,1rem) clamp(.75rem,1.5vw,1.3rem);
      background:rgba(255,255,255,.055);
      border:1.5px solid rgba(255,255,255,.13);
      border-radius:clamp(.55rem,1.4vw,.95rem);
      color:#fff; font-family:'Tajawal',sans-serif;
      font-size:clamp(.88rem,1.7vw,1.25rem);
      outline:none; transition:border-color .3s;
    }
    .form-input:focus { border-color:rgba(201,162,39,.65); }
    .form-input::placeholder { color:rgba(255,255,255,.32); }
    textarea.form-input { resize:none; height:clamp(90px,14vh,145px); line-height:1.8; }
    .btn-submit {
      width:100%; padding:clamp(.85rem,2vh,1.35rem);
      background:linear-gradient(135deg,#b8860b,#f0d060,#b8860b);

    <path d="M66,44 Q72,58 70,72 Q72,82 68,95" stroke="#2d1200" stroke-width="7" fill="none" stroke-linecap="round" opacity=".9"/>
    <path d="M34,57 Q28,62 34,67" stroke="#c9a227" stroke-width="1" fill="none" opacity=".45"/>
    <path d="M66,57 Q72,62 66,67" stroke="#c9a227" stroke-width="1" fill="none" opacity=".45"/>
    <path d="M42,77 L50,86 L58,77" stroke="#c9a227" stroke-width="1" fill="none" opacity=".5"/>
  </svg>`
];

/* ════════════════════════════════════════════
   STARS
════════════════════════════════════════════ */
const sc = document.getElementById('stars-canvas');
const sx = sc.getContext('2d');
function resizeCanvases(){
  sc.width  = window.innerWidth;
  sc.height = window.innerHeight;
  cc2.width  = window.innerWidth;
  cc2.height = window.innerHeight;
}
const stars = Array.from({length:220},()=>({
  x:Math.random(), y:Math.random(),
  r:Math.random()*1.6+.3,
  phase:Math.random()*Math.PI*2,
  speed:Math.random()*.8+.3
}));
function animStars(t){
  sx.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s=>{
    const a=.25+.75*(.5+.5*Math.sin(t*.001*s.speed+s.phase));
    sx.beginPath();
    sx.arc(s.x*sc.width, s.y*sc.height, s.r,0,Math.PI*2);
    sx.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`;
    sx.fill();
  });
  requestAnimationFrame(animStars);
}
requestAnimationFrame(animStars);

/* ════════════════════════════════════════════
   CONFETTI
════════════════════════════════════════════ */
const cc2   = document.getElementById('confetti-canvas');
const cx2   = cc2.getContext('2d');
let confetti=[];
const confC=['#c9a227','#f0d060','#a855f7','#f472b6','#fff','#7c3aed','#60d5fa'];
function spawnConf(n=120){
  for(let i=0;i<n;i++) confetti.push({
    x:Math.random()*cc2.width, y:-30-Math.random()*200,
    vx:(Math.random()-.5)*7, vy:Math.random()*5+2,
    color:confC[~~(Math.random()*confC.length)],
    w:Math.random()*14+4, h:Math.random()*7+3,
    rot:Math.random()*360, rs:(Math.random()-.5)*9,
    life:1
  });
}
function animConf(){
  cx2.clearRect(0,0,cc2.width,cc2.height);
  confetti=confetti.filter(p=>p.life>.01);
  confetti.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.06; p.rot+=p.rs; p.life-=.007;
    cx2.save();
    cx2.globalAlpha=Math.max(0,p.life);
    cx2.translate(p.x,p.y); cx2.rotate(p.rot*Math.PI/180);
    cx2.fillStyle=p.color;
    cx2.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    cx2.restore();
  });
  requestAnimationFrame(animConf);
}
animConf();
window.addEventListener('resize', resizeCanvases);
resizeCanvases();

/* ════════════════════════════════════════════
   PARTICLES
════════════════════════════════════════════ */
const pC=['rgba(201,162,39,.6)','rgba(168,85,247,.5)','rgba(244,114,182,.5)','rgba(255,255,255,.4)'];
for(let i=0;i<28;i++){
  const el=document.createElement('div'); el.className='particle';
  const s=Math.random()*5+2;
  el.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${pC[~~(Math.random()*pC.length)]};animation-duration:${12+Math.random()*20}s;animation-delay:${Math.random()*-30}s;`;
  document.body.appendChild(el);
}

/* ════════════════════════════════════════════
   DATETIME
════════════════════════════════════════════ */
function updateTime(){
  const n=new Date();
  document.getElementById('datetime').innerHTML=
    n.toLocaleDateString('ar-SA-u-nu-latn',{weekday:'long',year:'numeric',month:'long',day:'numeric'})
    +'<br>'+n.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
}
updateTime(); setInterval(updateTime,30000);

/* ════════════════════════════════════════════
   SETTINGS
════════════════════════════════════════════ */
function applySettings(){
  const s=JSON.parse(localStorage.getItem('grad_settings')||'{}');
  if(s.schoolName) document.getElementById('school-name-el').textContent=s.schoolName;
  if(s.batch)      document.getElementById('batch-el').textContent=s.batch;
  if(s.ministryLogo){ const w=document.getElementById('ministry-logo-wrap'); w.innerHTML=`<img src="${s.ministryLogo}" style="width:86%;height:86%;object-fit:contain;">`; }
  if(s.schoolLogo)  { const w=document.getElementById('school-logo-wrap');   w.innerHTML=`<img src="${s.schoolLogo}"   style="width:86%;height:86%;object-fit:contain;">`; }
  const tickText=s.ticker||'مبارك للخريجات العزيزات';
  const items=[tickText,'اليوم تحصدن ثمار سنوات من الجد والاجتهاد','نفخر بكنّ يا نجمات المستقبل','التعليم جواز سفركِ إلى آفاق لا حدود لها'];
  const doubled=[...items,...items];
  document.getElementById('ticker-track').innerHTML=doubled.map(t=>`<div class="ticker-item"><span class="t-star">✦</span>${t}<span class="t-star">✦</span></div>`).join('');
}

/* ════════════════════════════════════════════
   GRADUATES
════════════════════════════════════════════ */
function getGraduates(){
  const raw=JSON.parse(localStorage.getItem('grad_messages')||'[]').filter(m=>m.active!==false);
  const src=raw.length?raw:DEMO;
  return src.map((m,i)=>({
    name:    m.studentName,
    avatar:  AVATARS[i % AVATARS.length],
    color:   COLORS[i  % COLORS.length],
    emoji:   EMOJIS[i  % EMOJIS.length],
    message: m.message,
    parent:  m.parentName?`ولي الأمر: ${m.parentName}`:'',
    quote:   QUOTES[i  % QUOTES.length]
  }));
}

/* ════════════════════════════════════════════
   CARD ENGINE — 3D CAROUSEL
════════════════════════════════════════════ */
const stage    = document.getElementById('stage');
const dotsWrap = document.getElementById('dots');
let cardEls=[], graduates=[], current=0, mainTimer=null;

/* Compute data-pos string for a card at index i when current=cur */
function posFor(i, cur, n){
  const offset=((i-cur)%n+n)%n;
  if(offset===0)   return '0';
  if(offset===1)   return '1';
  if(offset===n-1) return '-1';
  if(offset===2)   return '2';
  if(offset===n-2) return '-2';
  return 'far';
}

function updatePositions(){
  const n=graduates.length;
  cardEls.forEach((card,i)=>{
    card.dataset.pos = posFor(i, current, n);
    const dot=document.getElementById(`dot${i}`);
    if(dot) dot.classList.toggle('active', i===current);
  });
}

function buildCards(){
  stage.innerHTML=''; dotsWrap.innerHTML=''; cardEls=[];
  graduates=getGraduates();
  document.getElementById('count-num').textContent=
    JSON.parse(localStorage.getItem('grad_messages')||'[]').filter(m=>m.active!==false).length;

  graduates.forEach((g,i)=>{
    const card=document.createElement('div');
    card.className='grad-card';
    card.dataset.pos='far';
    card.innerHTML=`
      <div class="cc tl"></div><div class="cc tr"></div>
      <div class="cc bl"></div><div class="cc br"></div>
      <div class="avatar-wrap">
        <div class="avatar-glow" style="background:radial-gradient(circle,${g.color}55 0%,transparent 70%)"></div>
        <div class="avatar-ring">
          <div class="avatar-inner">${g.avatar}</div>
        </div>
        <div class="orbit"><div class="orbit-dot"></div></div>
        <div class="grad-cap-badge">🎓 خريجة دفعة ١٤٤٦هـ</div>
      </div>
      <div class="student-name">${g.name}</div>
      <div class="grad-pill"><span>${g.emoji}</span><span>مبارك التخرج</span><span>${g.emoji}</span></div>
      <div class="divider"><div class="div-line"></div><div class="div-icon">✦</div><div class="div-line"></div></div>
      <div class="msg-box">
        <div class="q-mark">"</div>
        <div class="msg-text">${g.message}</div>
      </div>
      <div class="sig">
        <div class="sig-line"></div>
        <div class="sig-name">${g.parent}</div>
        <div class="sig-line"></div>
      </div>
      <div class="quote-row"><div class="quote-text">"${g.quote}"</div></div>
    `;
    stage.appendChild(card);
    cardEls.push(card);

    const dot=document.createElement('div');
    dot.className='dot'; dot.id=`dot${i}`;
    dotsWrap.appendChild(dot);
  });
}

function startBar(){
  const b=document.getElementById('timer-bar');
  b.style.transition='none'; b.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    b.style.transition=`width ${DURATION}ms linear`; b.style.width='100%';
  }));
}

function showCard(idx){
  current=idx;
  updatePositions();
  setTimeout(()=>spawnConf(80),300);
  setTimeout(()=>spawnConf(50),1000);
  startBar();
}

function nextCard(){
  current=(current+1)%graduates.length;
  showCard(current);
}

function startShow(){
  if(mainTimer) clearInterval(mainTimer);
  current=0; buildCards();
  showCard(0);
  mainTimer=setInterval(nextCard,DURATION);
}

/* ════════════════════════════════════════════
   MODAL
════════════════════════════════════════════ */
function openModal(){
  document.getElementById('form-wrap').style.display='block';
  document.getElementById('success-wrap').style.display='none';
  ['f-student','f-parent','f-msg'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-student').focus(),300);
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function handleOverlayClick(e){ if(e.target===document.getElementById('modal')) closeModal(); }

function submitForm(){
  const s=document.getElementById('f-student').value.trim();
  const p=document.getElementById('f-parent').value.trim();
  const m=document.getElementById('f-msg').value.trim();
  if(!s||!p||!m){ alert('يرجى ملء جميع الحقول'); return; }
  const msgs=JSON.parse(localStorage.getItem('grad_messages')||'[]');
  msgs.push({id:'m'+Date.now(), studentName:s, parentName:p, message:m, active:true, createdAt:Date.now()});
  localStorage.setItem('grad_messages',JSON.stringify(msgs));
  document.getElementById('form-wrap').style.display='none';
  document.getElementById('success-wrap').style.display='block';
  spawnConf(150);
  setTimeout(()=>{ startShow(); closeModal(); },3000);
}

/* ════════════════════════════════════════════
   AUTO-REFRESH
════════════════════════════════════════════ */
setInterval(applySettings, 15000);
setInterval(()=>{
  const n=JSON.parse(localStorage.getItem('grad_messages')||'[]').filter(m=>m.active!==false).length;
  if(n!==graduates.length) startShow();
},30000);

/* ════════════════════════════════════════════
   BOOT
════════════════════════════════════════════ */
applySettings();
startShow();
</script>
