services:
  - type: web
    name: cinematicgraduation
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn graduation.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: cinematicgraduation-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        value: dyg4401o9
      - key: CLOUDINARY_API_KEY
        value: "489947491336852"
      - key: CLOUDINARY_API_SECRET
        sync: false   # ← تكتبينه يدوياً في Render لأنه سري

databases:
  - name: cinematicgraduation-db
    databaseName: cinematicgraduation
    user: cinematicgraduation_user
